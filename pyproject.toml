version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Dawson Lan", email = "47137689+AnEvilBurrito@users.noreply.github.com" }
]
requires-python = ">=3.11"
dependencies = [
    "antimony>=2.13.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "sympy>=1.12",
    "numba>=0.58.0",
    "joblib>=1.3.0",
    "tqdm>=4.65.0",
