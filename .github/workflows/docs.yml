name: publish-docs
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material mkdocstrings[python]
      - run: mkdocs build

      - name: Push built site to GitHub Pages repo
        env:
          GH_DOC_TOKEN: ${{ secrets.GH_DOC_TOKEN }}
        run: |
          set -euo pipefail
          CLONE_DIR="$(mktemp -d)"
          TARGET_REPO="synthetic-models/synthetic-models.github.io.git"
          AUTH_URL="https://x-access-token:${GH_DOC_TOKEN}@github.com/${TARGET_REPO}"

          git clone --single-branch --branch main "$AUTH_URL" "$CLONE_DIR"
          rsync -a --delete --exclude '.git' site/ "$CLONE_DIR/"
          cd "$CLONE_DIR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0

          git commit -m "docs: update from Synthetic ${GITHUB_SHA::7}"
          git push "$AUTH_URL" main
