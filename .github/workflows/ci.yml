name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check for version change
        id: version_check
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/synthetic-models/${CURRENT_VERSION}/json")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version $CURRENT_VERSION already exists on PyPI, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version $CURRENT_VERSION detected (PyPI returned $HTTP_STATUS)"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.version_check.outputs.should_publish == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        if: steps.version_check.outputs.should_publish == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        if: steps.version_check.outputs.should_publish == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.version_check.outputs.should_publish == 'true'
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

  tag:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version_check
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          TAG="v${{ steps.version_check.outputs.current_version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi